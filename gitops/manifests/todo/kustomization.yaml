apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Existing manifests are listed here so the app renders via Kustomize.
# ArgoCD Image Updater writes the running image tag into an override file
# (.argocd-source-app-todo.yaml) that ArgoCD applies on top of these images.
resources:
- 00-namespace.yaml
- 10-postgres.yaml
- 20-todo-api.yaml
- 30-todo-frontend.yaml
- 40-networkpolicy.yaml
images:
- name: 172.31.9.150:30500/todo-api
  newTag: v1
- name: 172.31.9.150:30500/todo-frontend
  newTag: v2
