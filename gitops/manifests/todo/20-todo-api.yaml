apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-api
  namespace: todo
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: todo-api
  template:
    metadata:
      labels:
        app: todo-api
      annotations:
        demo: "gitops-1"
    spec:
      serviceAccountName: todo-api
      containers:
      - name: todo-api
        image: 172.31.9.150:30500/todo-api:v1
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: todo-api-config
        env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: todo-pg-app
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: todo-pg-app
              key: password
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 300m
            memory: 128Mi