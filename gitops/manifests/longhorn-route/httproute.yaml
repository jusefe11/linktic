apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  parentRefs:
  - { name: main-gateway, namespace: istio-ingress, sectionName: https }
  hostnames: ["longhorn.local"]
  rules:
  - backendRefs:
    - { name: longhorn-frontend, port: 80 }
