# Public exposure via Cloudflare TryCloudflare (ephemeral URL, no account needed).
# Tunnels the ToDo frontend to a public *.trycloudflare.com URL with real Cloudflare TLS.
apiVersion: apps/v1
kind: Deployment
metadata: { name: cloudflared, namespace: todo }
spec:
  replicas: 1
  selector: { matchLabels: { app: cloudflared } }
  template:
    metadata:
      labels: { app: cloudflared }
      annotations: { sidecar.istio.io/inject: "false" }   # tunnel client, keep out of mesh
    spec:
      containers:
      - name: cloudflared
        image: cloudflare/cloudflared:2024.10.0
        args: ["tunnel","--no-autoupdate","--url","http://todo-frontend.todo.svc.cluster.local:3000"]
        resources: { requests: { cpu: 20m, memory: 32Mi }, limits: { memory: 96Mi } }
---
# Allow the tunnel client to reach the frontend (NetworkPolicy default-denies otherwise).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-cloudflared-frontend, namespace: todo }
spec:
  podSelector: { matchLabels: { app: todo-frontend } }
  policyTypes: [Ingress]
  ingress:
  - from: [{ podSelector: { matchLabels: { app: cloudflared } } }]
    ports: [{ protocol: TCP, port: 3000 }]
