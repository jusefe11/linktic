apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata: { name: istio-proxies, namespace: monitoring }
spec:
  namespaceSelector: { any: true }
  selector:
    matchExpressions: [{ key: security.istio.io/tlsMode, operator: Exists }]
  podMetricsEndpoints:
  - port: http-envoy-prom
    path: /stats/prometheus
    interval: 15s
