# Exposes ArgoCD UI at https://argocd.local via the main Gateway (TLS terminated at Gateway).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
  - name: main-gateway
    namespace: istio-ingress
    sectionName: https
  hostnames: ["argocd.local"]
  rules:
  - backendRefs:
    - name: argocd-server
      port: 80
