apiVersion: v1
kind: Namespace
metadata: { name: registry }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: registry-data, namespace: registry }
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources: { requests: { storage: 10Gi } }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: registry, namespace: registry }
spec:
  replicas: 1
  selector: { matchLabels: { app: registry } }
  template:
    metadata: { labels: { app: registry } }
    spec:
      containers:
      - name: registry
        image: registry:2.8.3
        ports: [{ containerPort: 5000 }]
        env:
        - { name: REGISTRY_HTTP_ADDR, value: ":5000" }
        - { name: REGISTRY_STORAGE_DELETE_ENABLED, value: "true" }
        volumeMounts: [{ name: data, mountPath: /var/lib/registry }]
        resources: { requests: { cpu: 50m, memory: 64Mi }, limits: { memory: 256Mi } }
      volumes:
      - { name: data, persistentVolumeClaim: { claimName: registry-data } }
---
apiVersion: v1
kind: Service
metadata: { name: registry, namespace: registry }
spec:
  type: NodePort
  selector: { app: registry }
  ports: [{ port: 5000, targetPort: 5000, nodePort: 30500 }]
