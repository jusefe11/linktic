apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-todo
  namespace: argocd
  annotations: { argocd.argoproj.io/sync-wave: "6" }
spec:
  project: default
  source: { repoURL: https://github.com/caferrerb/cloud-native-k8s-test, targetRevision: main, path: gitops/manifests/todo }
  destination: { server: https://kubernetes.default.svc, namespace: todo }
  syncPolicy: { automated: { prune: false, selfHeal: false }, syncOptions: [CreateNamespace=true] }
