apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-gateway
  namespace: argocd
  annotations: { argocd.argoproj.io/sync-wave: "4" }
spec:
  project: default
  source:
    repoURL: https://github.com/caferrerb/cloud-native-k8s-test
    targetRevision: main
    path: gitops/manifests/gateway
  destination: { server: https://kubernetes.default.svc, namespace: istio-ingress }
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
