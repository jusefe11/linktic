apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-cert-manager-issuers
  namespace: argocd
  annotations: { argocd.argoproj.io/sync-wave: "1" }
spec:
  project: default
  source:
    repoURL: https://github.com/jusefe11/linktic
    targetRevision: main
    path: gitops/manifests/cert-manager
  destination: { server: https://kubernetes.default.svc, namespace: cert-manager }
  syncPolicy:
    automated: { prune: true, selfHeal: true }
