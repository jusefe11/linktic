apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: platform-gateway
  namespace: istio-system
spec:
  gatewayClassName: istio
  listeners:

  - name: http
    protocol: HTTP
    port: 80
    hostname: "*.local"
    allowedRoutes:
      namespaces:
        from: All

  - name: https
    protocol: HTTPS
    port: 443
    hostname: "*.local"
    tls:
      mode: Terminate
      certificateRefs:
      - kind: Secret
        name: wildcard-local-tls
    allowedRoutes:
      namespaces:
        from: All
