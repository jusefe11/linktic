apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - name: platform-gateway
      namespace: istio-system
      sectionName: https
  hostnames: [argocd.local]
  rules:
    - backendRefs:
        - name: argo-cd-argocd-server
          port: 80
---
