apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: local-selfsigned-bootstrap
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: local-root-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: LinkTIC Local Root CA
  secretName: local-root-ca
  duration: 87600h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: local-selfsigned-bootstrap
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: local-ca
spec:
  ca:
    secretName: local-root-ca
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-local
  namespace: istio-system
spec:
  secretName: wildcard-local-tls
  commonName: "*.local"
  dnsNames:
    - "*.local"
    - todo.local
    - api.todo.local
  duration: 8760h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: local-ca
    kind: ClusterIssuer
