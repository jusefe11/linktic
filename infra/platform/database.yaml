apiVersion: v1
kind: Secret
metadata:
  name: tododb-app
  namespace: todo
  annotations:
    description: Demo credentials; use External Secrets or Sealed Secrets in production
type: kubernetes.io/basic-auth
stringData:
  username: todo
  password: TodoDb-2026!
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: tododb
  namespace: todo
spec:
  description: Highly available PostgreSQL cluster for the ToDo application
  instances: 3
  primaryUpdateStrategy: unsupervised
  inheritedMetadata:
    annotations:
      sidecar.istio.io/inject: "false"
  bootstrap:
    initdb:
      database: tododb
      owner: todo
      secret:
        name: tododb-app
  storage:
    storageClass: longhorn
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
  monitoring:
    enablePodMonitor: true
  postgresql:
    parameters:
      max_connections: "150"
      shared_buffers: 128MB
