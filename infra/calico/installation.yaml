# Calico CNI for k3s on AWS. Applied AFTER tigera-operator.yaml (v3.29.1).
# Key AWS decision: encapsulation VXLAN (always) so pod traffic is wrapped in the
# nodes' IPs -> survives the AWS VPC source/dest check (BGP/IPIP would be dropped).
apiVersion: operator.tigera.io/v1
kind: Installation
metadata:
  name: default
spec:
  flexVolumePath: /var/lib/rancher/k3s/agent/kubelet/plugins/volume/exec/
  calicoNetwork:
    ipPools:
    - blockSize: 26
      cidr: 10.42.0.0/16          # matches k3s default cluster-cidr
      encapsulation: VXLAN
      natOutgoing: Enabled
      nodeSelector: all()
---
apiVersion: operator.tigera.io/v1
kind: APIServer
metadata:
  name: default
spec: {}
