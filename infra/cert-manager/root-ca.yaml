apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: root-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: local-root-ca
  secretName: root-ca-secret
  duration: 87600h
  privateKey:
    algorithm: RSA
    size: 4096
  issuerRef:
    name: selfsigned-clusterissuer
    kind: ClusterIssuer
