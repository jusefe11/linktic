apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudnativepg
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jusefe11/linktic.git
    targetRevision: main
    path: infra/cloudnativepg
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

