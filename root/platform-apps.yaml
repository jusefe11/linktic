apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istiod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: default
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: istiod
    targetRevision: 1.30.1
    helm:
      releaseName: istiod
      valuesObject:
        nodeSelector:
          node-role.kubernetes.io/worker: "true"
        meshConfig:
          enableTracing: true
          defaultConfig:
            tracing: {}
          extensionProviders:
            - name: jaeger
              opentelemetry:
                service: jaeger-collector.observability.svc.cluster.local
                port: 4317
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 86.3.2
    helm:
      releaseName: kube-prometheus-stack
      valuesObject:
        alertmanager:
          enabled: false
        grafana:
          adminPassword: admin
          nodeSelector:
            node-role.kubernetes.io/worker: "true"
          sidecar:
            dashboards:
              enabled: true
              searchNamespace: ALL
          dashboards:
            default:
              istio-mesh:
                gnetId: 7639
                revision: 225
                datasource: Prometheus
        prometheus:
          prometheusSpec:
            nodeSelector:
              node-role.kubernetes.io/worker: "true"
            retention: 24h
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            resources:
              requests: { cpu: 200m, memory: 512Mi }
              limits: { cpu: "1", memory: 2Gi }
        kubeControllerManager: { enabled: false }
        kubeScheduler: { enabled: false }
        kubeEtcd: { enabled: false }
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kiali
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://kiali.org/helm-charts
    chart: kiali-server
    targetRevision: 2.27.0
    helm:
      releaseName: kiali
      valuesObject:
        deployment:
          nodeSelector:
            node-role.kubernetes.io/worker: "true"
        auth:
          strategy: anonymous
        external_services:
          prometheus:
            url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
          tracing:
            enabled: true
            in_cluster_url: http://jaeger-query.observability.svc.cluster.local:16686
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 7.0.0
    helm:
      releaseName: loki
      valuesObject:
        deploymentMode: SingleBinary
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
        singleBinary:
          replicas: 1
          nodeSelector:
            node-role.kubernetes.io/worker: "true"
          persistence:
            enabled: true
            storageClass: longhorn
            size: 5Gi
        backend: { replicas: 0 }
        read: { replicas: 0 }
        write: { replicas: 0 }
        minio: { enabled: false }
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
---
