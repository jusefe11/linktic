apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  project: default
  source:
    repoURL: https://charts.longhorn.io
    chart: longhorn
    targetRevision: 1.12.0
    helm:
      releaseName: longhorn
      valuesObject:
        preUpgradeChecker:
          jobEnabled: false
        global:
          nodeSelector:
            node-role.kubernetes.io/worker: "true"
        persistence:
          defaultClass: true
          defaultClassReplicaCount: 2
        defaultSettings:
          defaultReplicaCount: 2
          replicaAutoBalance: best-effort
          storageMinimalAvailablePercentage: 10
          systemManagedComponentsNodeSelector: node-role.kubernetes.io/worker:true
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudnative-pg
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  project: default
  source:
    repoURL: https://cloudnative-pg.github.io/charts
    chart: cloudnative-pg
    targetRevision: 0.28.3
    helm:
      releaseName: cloudnative-pg
      valuesObject:
        nodeSelector:
          node-role.kubernetes.io/worker: "true"
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: cloudnative-pg
      namespace: cnpg-system
      jsonPointers:
        - /spec/template/spec/containers/0/startupProbe
        - /spec/template/spec/containers/0/livenessProbe
        - /spec/template/spec/containers/0/readinessProbe
        - /spec/template/spec/containers/0/resources
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true, RespectIgnoreDifferences=true]
---
