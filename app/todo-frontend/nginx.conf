server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;

    # SPA: serve index.html for any non-file path
    location / {
        try_files $uri /index.html;
    }

    # Same-origin API proxy -> todo-api service (mesh-traced by the Istio sidecars).
    # The trailing slash strips the /api/ prefix: /api/tasks -> todo-api:8080/tasks
    location /api/ {
        proxy_pass http://todo-api.todo.svc.cluster.local:8080/;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
    }
}
