apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
  - name: platform-gateway-istio
    namespace: istio-system
  hostnames:
  - grafana.local
  rules:
  - backendRefs:
    - name: kube-prometheus-stack-grafana
      port: 80
