<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Todo Cloud Native</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; color: #eaf2ff; background: radial-gradient(circle at 15% 10%, #1e3a5f 0, #08111f 38%, #050912 100%); }
    main { width: min(760px, calc(100% - 32px)); margin: 0 auto; padding: 64px 0; }
    .eyebrow { color: #67e8f9; text-transform: uppercase; letter-spacing: .18em; font-size: 12px; font-weight: 700; }
    h1 { margin: 8px 0; font-size: clamp(36px, 8vw, 64px); line-height: 1; }
    .subtitle { color: #9fb2cc; margin: 0 0 32px; }
    .card { background: rgba(13, 27, 46, .82); border: 1px solid #243a57; box-shadow: 0 24px 80px rgba(0,0,0,.35); backdrop-filter: blur(14px); border-radius: 20px; padding: 22px; }
    form { display: grid; grid-template-columns: 1fr auto; gap: 10px; }
    input, button { border-radius: 12px; border: 1px solid #304966; font: inherit; }
    input { color: #fff; background: #091522; padding: 14px 16px; outline: none; }
    input:focus { border-color: #22d3ee; box-shadow: 0 0 0 3px rgba(34,211,238,.15); }
    button { cursor: pointer; color: #041019; background: #67e8f9; font-weight: 800; padding: 12px 18px; }
    button:hover { filter: brightness(1.08); }
    ul { list-style: none; padding: 0; margin: 22px 0 0; display: grid; gap: 10px; }
    li { display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 12px; padding: 13px 14px; background: #0a1726; border: 1px solid #1d334e; border-radius: 13px; }
    li.done span { text-decoration: line-through; color: #70849d; }
    li button { color: #fda4af; background: transparent; border-color: transparent; padding: 7px; }
    .status { margin-top: 16px; min-height: 20px; color: #93c5fd; font-size: 14px; }
    .empty { text-align: center; color: #71859f; padding: 24px; }
    footer { display: flex; flex-wrap: wrap; gap: 8px; color: #70849d; margin-top: 20px; font-size: 12px; }
    footer span { border: 1px solid #1c3048; border-radius: 999px; padding: 5px 9px; }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">Kubernetes · Istio · CloudNativePG</div>
    <h1>Lo importante,<br>bien trazado.</h1>
    <p class="subtitle">Cada cambio persiste en PostgreSQL y recorre el Gateway de Istio.</p>
    <section class="card">
      <form id="form">
        <input id="title" maxlength="250" placeholder="¿Qué sigue?" required autocomplete="off">
        <button type="submit">Crear tarea</button>
      </form>
      <div id="status" class="status">Conectando con la API…</div>
      <ul id="tasks"></ul>
    </section>
    <footer><span>HTTPS local CA</span><span>mTLS STRICT</span><span>2+ réplicas</span><span>Prometheus + Jaeger</span></footer>
  </main>
  <script>
    const list = document.querySelector('#tasks');
    const status = document.querySelector('#status');
    const title = document.querySelector('#title');

    async function request(path = '', options = {}) {
      const response = await fetch(`/api/tasks${path}`, {
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
        ...options
      });
      if (!response.ok && response.status !== 204) throw new Error((await response.json()).error || response.statusText);
      return response.status === 204 ? null : response.json();
    }

    async function load() {
      try {
        const tasks = await request();
        status.textContent = `${tasks.length} tarea${tasks.length === 1 ? '' : 's'} · API disponible`;
        list.innerHTML = '';
        if (!tasks.length) list.innerHTML = '<li class="empty">Aún no hay tareas. Buen momento para empezar.</li>';
        tasks.forEach(task => {
          const row = document.createElement('li');
          row.className = task.done ? 'done' : '';
          const check = document.createElement('input');
          check.type = 'checkbox'; check.checked = task.done;
          check.onchange = async () => { await request(`/${task.id}`, { method: 'PUT', body: JSON.stringify({ done: check.checked }) }); load(); };
          const text = document.createElement('span'); text.textContent = task.title;
          const remove = document.createElement('button'); remove.textContent = 'Eliminar';
          remove.onclick = async () => { await request(`/${task.id}`, { method: 'DELETE' }); load(); };
          row.append(check, text, remove); list.append(row);
        });
      } catch (error) { status.textContent = `API no disponible: ${error.message}`; }
    }

    document.querySelector('#form').onsubmit = async event => {
      event.preventDefault();
      try { await request('', { method: 'POST', body: JSON.stringify({ title: title.value, done: false }) }); title.value = ''; await load(); }
      catch (error) { status.textContent = error.message; }
    };
    load();
    setInterval(load, 15000);
  </script>
</body>
</html>
