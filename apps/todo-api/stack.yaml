apiVersion: v1
kind: ServiceAccount
metadata:
  name: todo-api
  namespace: todo
automountServiceAccountToken: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: todo-api-config
  namespace: todo
data:
  DB_HOST: tododb-rw.todo.svc.cluster.local
  DB_PORT: "5432"
  DB_NAME: tododb
  OTEL_SERVICE_NAME: todo-api
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger-collector.observability.svc.cluster.local:4318/v1/traces
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-api
  namespace: todo
  labels:
    app: todo-api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: todo-api
  template:
    metadata:
      labels:
        app: todo-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: todo-api
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: todo-api
          image: 192.168.1.50:30500/todo-api:v1
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: todo-api-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: tododb-app
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tododb-app
                  key: password
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 600m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: todo-api
  namespace: todo
  labels:
    app: todo-api
spec:
  selector:
    app: todo-api
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: todo-api
  namespace: todo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: todo-api
  minReplicas: 2
  maxReplicas: 5
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: todo-api
  namespace: todo
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: todo-api
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: todo-api
  namespace: todo
spec:
  parentRefs:
    - name: platform-gateway
      namespace: istio-system
      sectionName: https
    - name: platform-gateway
      namespace: istio-system
      sectionName: api-internal
  hostnames:
    - api.todo.local
  rules:
    - backendRefs:
        - name: todo-api
          port: 8080
