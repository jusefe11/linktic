        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: todo-api-config
              key: DB_HOST

        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: todo-api-config
              key: DB_NAME

        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: todo-api-secret
              key: DB_USER

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: todo-api-secret
              key: DB_PASSWORD

        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080

        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
